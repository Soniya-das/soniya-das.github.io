<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Soniya D - Python Full Stack Developer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Close Icon - RIGHT SIDE -->
  <a href="index.html" class="close-icon-right">
    <i class="fas fa-times"></i>
  </a>

  <main class="page-section">
    
    <!-- Luxury Contact Heading -->
    <div class="contact-heading-luxury">
      <div class="contact-heading-icon">
        <i class="fas fa-envelope"></i>
      </div>
      <h2 class="contact-luxury-title">Get In Touch</h2>
      <div class="contact-heading-underline">
        <span class="contact-underline-dot"></span>
        <span class="contact-underline-line"></span>
        <span class="contact-underline-dot"></span>
      </div>
      <p class="contact-heading-subtitle">Let's work together</p>
    </div>
    
    <!-- Luxury Contact Container -->
    <div class="contact-luxury-container">
      <div class="contact-luxury-card">



       <!-- Email - Click to open email client -->
        <div class="contact-luxury-item">
          <div class="contact-icon-circle">
            <i class="fas fa-envelope"></i>
          </div>
          <div class="contact-details">
            <h4>Email</h4>
            <a href="mailto:soniyadasperera@gmail.com" class="email-hyperlink">
              soniyadasperera@gmail.com
            </a>
          </div>
        </div>
        
        
        <!-- Location - No click action -->
        <div class="contact-luxury-item">
          <div class="contact-icon-circle">
            <i class="fas fa-map-marker-alt"></i>
          </div>
          <div class="contact-details">
            <h4>Location</h4>
            <p>Trivandrum, Kerala</p>
          </div>
        </div>
        
        <!-- Social Links -->
        <div class="contact-social-luxury">
          <a href="#" target="_blank" class="social-luxury-link">
            <i class="fab fa-github"></i>
            <span>GitHub</span>
          </a>
          <a href="https://www.linkedin.com/in/soniyadas05" target="_blank" class="social-luxury-link">
            <i class="fab fa-linkedin-in"></i>
            <span>LinkedIn</span>
          </a>
        </div>
      </div>
    </div>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
