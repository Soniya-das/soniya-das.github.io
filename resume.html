    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Minimal extra styling for the resume page */
        .resume-download-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border-radius: 48px;
            padding: 3rem;
            text-align: center;
            border: 1px solid var(--card-border);
            transition: all 0.4s ease;
            max-width: 500px;
            margin: 0 auto;
        }
        .resume-download-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: 0 30px 50px var(--primary-glow);
        }
        .resume-icon {
            font-size: 4rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }
        .resume-download-card h3 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        .resume-download-card p {
            margin-bottom: 2rem;
            opacity: 0.8;
        }
        .btn-download {
            padding: 1rem 2.5rem;
            font-weight: 600;
            letter-spacing: 1px;
            border-radius: 60px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            transition: all 0.3s ease;
        }
        .btn-download:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px var(--primary-glow);
        }
        @media (max-width: 768px) {
            .resume-download-card {
                padding: 2rem;
            }
            .resume-icon {
                font-size: 3rem;
            }
        }
    </style>
</head>

    <section class="page-header">
        <div class="container">
            <h1 data-aos="fade-up">Resume</h1>
            <p data-aos="fade-up" data-aos-delay="100">Download my professional resume</p>
        </div>
    </section>

    <section class="resume-section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8" data-aos="zoom-in" data-aos-duration="1000">
                    <div class="resume-download-card">
                        <div class="resume-icon">
                            <i class="fas fa-file-alt"></i>
                        </div>
                        <h3>Ready to work together?</h3>
                        <p>Download my complete resume to see my experience, skills, and projects in detail.</p>
                        <a href="assets/resume.pdf" class="btn btn-primary btn-download" download>

                        </a>
